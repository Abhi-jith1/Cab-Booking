<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cab Booking - User Registration</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div class="container">
    <div class="form-box">
      <h2><i class="fa-solid fa-taxi"></i> Cab Booking - Register</h2>
      <form action="regpro.php" method="POST">

        <!-- Name -->
        <div class="input-group">
          <label for="name"><i class="fa fa-user"></i></label>
          <input type="text" id="name" name="name" placeholder="Name" required>
        </div>

        <!-- Contact -->
        <div class="input-group">
          <label for="contact"><i class="fa fa-phone"></i></label>
          <input type="text" id="contact" name="contact" placeholder="Number" required>
        </div>

        <!-- Address -->
        <div class="input-group">
          <label for="address"><i class="fa fa-home"></i></label>
          <input type="text" id="address" name="address" placeholder="Address" required>
        </div>

        <!-- Email -->
        <div class="input-group">
          <label for="email"><i class="fa fa-envelope"></i></label>
          <input type="email" id="email" name="email" placeholder="Email" required>
        </div>

        <!-- Username -->
        <div class="input-group">
          <label for="username"><i class="fa fa-id-badge"></i></label>
          <input type="text" id="username" name="username" placeholder="Username" required>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label for="password"><i class="fa fa-lock"></i></label>
          <input type="password" id="password" name="password" placeholder="Password" required>
        </div>

        <!-- Submit -->
        <div class="input-group">
          <button type="submit" >Register</button>
        </div>

        <p class="redirect">Already registered? <a href="Login.html">Login here</a></p>
      </form>
    </div>
  </div>
</body>

</html>
